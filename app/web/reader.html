<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Читалка книги</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <main class="container reader-container">
    <section class="card">
      <h1 id="readerTitle">Читалка</h1>
      <p id="readerMeta" class="subtitle">Загрузка...</p>
      <div class="reader-toolbar">
        <button id="readerBackBtn" class="btn-compact" type="button">Назад</button>
        <button id="readerTopBtn" class="btn-compact" type="button">В начало</button>
      </div>
      <pre id="readerText" class="reader-text">Обработка...</pre>
    </section>
  </main>
  <script src="/web/reader.js"></script>
</body>
</html>
