<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Умный поиск по книгам</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Умный поиск по книгам</h1>
    <p class="subtitle">Локальный тестовый стенд: загрузка .txt/.fb2/.epub, поиск фрагментов и ответы по цитатам.</p>

    <section class="card">
      <h2>1) Загрузка книги</h2>
      <input id="bookFile" type="file" accept=".txt,.fb2,.epub" />
      <button id="uploadBtn">Загрузить</button>
      <div class="inline-controls">
        <select id="preloadedBook">
          <option value="">Выберите предзагруженную книгу</option>
        </select>
        <button id="loadPreloadedBtn" class="btn-compact">Выбрать из предзагруженных</button>
      </div>
      <button id="readBookBtn" class="hidden">Читать книгу</button>
      <div id="uploadResult" class="result"></div>
    </section>

    <section class="card">
      <h2>2) Поиск фрагментов</h2>
      <label for="quoteSize">Размер выводимого фрагмента (символов):</label>
      <input id="quoteSize" type="number" min="120" max="2400" step="20" value="420" />
      <input id="searchQuery" placeholder="Например: где говорится про собаку" />
      <button id="searchBtn">Найти</button>
      <div id="searchResult" class="result"></div>
    </section>

    <section class="card">
      <h2>3) Вопрос по книгам</h2>
      <p class="hint">Лучше уточнять персонажа, действие и сцену: «Почему Пьер отказался ехать?»</p>
      <input id="askQuery" placeholder="Например: почему герой принял это решение в этой сцене?" />
      <button id="askBtn">Спросить</button>
      <div id="askResult" class="result"></div>
    </section>
  </main>

  <script src="/web/app.js"></script>
</body>
</html>
